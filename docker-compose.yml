version: '3.8'

services:

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend1:
    build: ./backend
    container_name: backend1
    depends_on:
      - db

  backend2:
    build: ./backend
    container_name: backend2
    depends_on:
      - db

  backend3:
    build: ./backend
    container_name: backend3
    depends_on:
      - db

volumes:
  db_data: